name: Trip Blog Auto Publisher (trip.bestwellth.org)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.10 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 여행 블로그 자동 발행
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY:    ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          WP_SITE_URL:            ${{ secrets.WP_SITE_URL }}
          WP_USERNAME:            ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:        ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:     ${{ secrets.PINTEREST_BOARD_ID }}
          COUPANG_PARTNERS_URL:   ${{ secrets.COUPANG_PARTNERS_URL }}
          OTLP_ENDPOINT:          ${{ secrets.OTLP_ENDPOINT }}
        run: python main.py
