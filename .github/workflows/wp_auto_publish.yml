name: Trip Blog Auto Publisher (trip.bestwellth.org)

on:
  workflow_dispatch:

jobs:
  trigger-pythonanywhere:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: PythonAnywhere 실행 트리거
        run: |
          curl -s -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/consoles/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            -d "executable=bash" \
            -d "arguments=-c 'cd ~/trip && git pull origin main && python main.py'"
          echo "PythonAnywhere 실행 트리거 완료"
